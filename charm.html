<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蹄蹄签文</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: 'Noto Serif SC', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .header {
            color: #d4af37;
            font-size: 24px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
        }
        .charm {
            background: linear-gradient(145deg, #fff9e6 0%, #f5e6c8 100%);
            border-radius: 8px;
            padding: 25px 20px;
            width: 300px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            text-align: center;
            border: 3px solid #d4af37;
        }
        .emoji { font-size: 40px; margin-bottom: 10px; }
        .fortune {
            color: #8B0000;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 15px;
            letter-spacing: 6px;
        }
        .poem {
            color: #2c2c2c;
            font-size: 13px;
            line-height: 1.8;
            margin-bottom: 12px;
        }
        .tag {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 11px;
            font-family: monospace;
        }
        .footer {
            color: rgba(255,255,255,0.6);
            font-size: 11px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="header">🎐 浅草寺签文</div>
    <div class="charm">
        <div class="emoji">🌟</div>
        <div class="fortune">大吉</div>
        <div class="poem">
            鳳凰树上花满开<br>
            彩云缭绕报喜来<br><br>
            今日所学如春雨<br>
            明日成长更可期
        </div>
        <div class="tag">#learning_bloom</div>
    </div>
    <div class="footer">蹄蹄自训练日记 · 2026-03-03</div>
</body>
</html>
